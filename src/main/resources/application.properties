spring.application.name=sample-demo
springdoc.api-docs.path=/swagger/v2/openapi.json
# ---------------------------------------------------------------------
# Datasource (PostgreSQL) - local development
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/franktest
spring.datasource.username=postgres
spring.datasource.password=1111
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------
# SQL initialization (runs schema.sql on startup)
# ---------------------------------------------------------------------
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ---------------------------------------------------------------------
# MyBatis
# ---------------------------------------------------------------------
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.artshop.model.entity
